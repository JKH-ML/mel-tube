<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelTube</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">🎵 MelTube</h1>

      <!-- 중앙 탭 -->
      <nav class="main-tabs">
        <button class="main-tab active" data-tab="chart">차트</button>
        <button class="main-tab" data-tab="liked">
          좋아요
          <span class="liked-count" id="likedCount"></span>
        </button>
        <button class="main-tab" data-tab="bugs">검색</button>
      </nav>

      <div class="header-right">
        <button class="theme-btn" id="themeBtn" title="라이트/다크 모드"></button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── 차트 탭 ── -->
    <div id="tabChart">
      <section class="chart-header">
        <div class="chart-title-wrap">
          <span class="chart-icon" id="chartIcon">🍈</span>
          <div>
            <h2 class="chart-name" id="chartName">TOP 100</h2>
            <p class="chart-updated" id="chartUpdated"></p>
          </div>
        </div>
        <div class="header-actions">
          <button class="refresh-btn" id="refreshBtn">
            <span class="refresh-icon">↻</span> 새로고침
          </button>
          <button class="history-btn" id="historyBtn">
            <i data-lucide="calendar" width="14" height="14"></i>
            날짜별 보기
          </button>
        </div>
      </section>

      <div class="history-panel" id="historyPanel" style="display:none">
        <div class="history-header">
          <span class="history-title">저장된 차트 기록</span>
          <button class="history-close" id="historyClose">✕</button>
        </div>
        <div class="history-dates" id="historyDates"></div>
      </div>

      <div class="controls">
        <input class="search-box" id="searchBox" type="text" placeholder="곡명 또는 아티스트 검색..." />
      </div>

      <div class="chart-list" id="chartList"></div>
    </div>

    <!-- ── 좋아요 탭 ── -->
    <div id="tabLiked" style="display:none">
      <section class="chart-header">
        <div class="chart-title-wrap">
          <span class="chart-icon">❤️</span>
          <div>
            <h2 class="chart-name">좋아요 목록</h2>
            <p class="chart-updated" id="likedUpdated"></p>
          </div>
        </div>
        <div class="header-actions">
          <button class="liked-play-all" id="likedPlayAll">
            <i data-lucide="play" width="12" height="12"></i>
            전체 재생
          </button>
          <button class="liked-clear" id="likedClear">전체 삭제</button>
        </div>
      </section>

      <div class="controls">
        <input class="search-box" id="likedSearchBox" type="text" placeholder="좋아요 목록에서 검색..." />
      </div>

      <div class="chart-list" id="likedList"></div>
    </div>

    <!-- ── 벅스 검색 탭 ── -->
    <div id="tabBugs" style="display:none">
      <section class="chart-header">
        <div class="chart-title-wrap">
          <span class="chart-icon">🔍</span>
          <div>
            <h2 class="chart-name">검색</h2>
            <p class="chart-updated" id="bugsSearchUpdated"></p>
          </div>
        </div>
      </section>

      <div class="controls">
        <input class="search-box" id="bugsSearchBox" type="text" placeholder="곡명 또는 아티스트를 입력하세요..." />
        <button class="refresh-btn" id="bugsSearchBtn">검색</button>
      </div>

      <div class="chart-list" id="bugsList"></div>
    </div>

  </main>

  <!-- 가사 패널 -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-header">
      <span class="lyrics-title" id="lyricsSongTitle"></span>
      <button class="lyrics-close" id="lyricsClose">✕</button>
    </div>
    <div class="lyrics-body" id="lyricsBody"></div>
  </div>

  <div class="player-bar" id="playerBar">
    <div class="loading-bar" id="loadingBar"></div>

    <div class="player-info">
      <div class="player-thumb-wrap">
        <img class="player-thumb" id="playerThumb" src="" alt="" />
      </div>
      <div class="player-text">
        <span class="player-title" id="playerTitle">곡을 선택하세요</span>
        <span class="player-artist" id="playerArtist">-</span>
        <span class="player-yt-info" id="playerYtInfo"></span>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn">▶</button>
      <button class="ctrl-btn" id="nextBtn">⏭</button>
      <button class="ctrl-btn play-mode-btn" id="playModeBtn" title="재생 모드"></button>
    </div>

    <div class="player-progress">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>

    <div class="player-extra">
      <button class="ctrl-btn download-btn" id="downloadBtn" title="MP3 다운로드">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="ctrl-btn lyrics-btn" id="lyricsBtn" title="가사 보기">가사</button>
      <button class="ctrl-btn like-btn" id="likeBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
      <div class="volume-wrap">
        🔊
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" />
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
